<style>
:root {
  --red: #E8001D;
  --bg: #0d0d14;
  --surface: #16161f;
  --surface2: #1e1e2a;
  --border: rgba(255,255,255,0.08);
  --text: #f0f0f5;
  --muted: #7a7a99;
  --green: #00d97e;
  --green-bg: rgba(0,217,126,0.12);
  --yellow: #ffd94a;
  --yellow-bg: rgba(255,217,74,0.12);
  --red-bg: rgba(232,0,29,0.12);
  --gray-bg: rgba(122,122,153,0.12);
  --gray: #555570;
  --shadow: 0 4px 20px rgba(0,0,0,0.4);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; min-height: 100vh; }

/* HEADER */
.header { background: linear-gradient(135deg, #0d0d14 0%, #1a0508 100%); border-bottom: 2px solid var(--red); padding: 18px 20px 16px; position: relative; overflow: hidden; }
.header::after { content: 'DATA'; position: absolute; right: -5px; top: -5px; font-family: 'Oswald', sans-serif; font-size: 80px; font-weight: 700; color: rgba(255,255,255,0.03); pointer-events: none; }
.header-eyebrow { font-size: 10px; letter-spacing: 3px; color: var(--red); font-weight: 700; margin-bottom: 4px; font-family: 'Oswald', sans-serif; }
.header h1 { font-family: 'Oswald', sans-serif; font-size: 20px; font-weight: 700; color: #fff; line-height: 1.3; }
.header h1 em { color: var(--red); font-style: normal; }
.header-sub { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 3px; }

/* NAV */
.nav-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; gap: 8px; align-items: center; overflow-x: auto; scrollbar-width: none; }
.nav-bar::-webkit-scrollbar { display: none; }
.nav-btn { padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 12px; font-family: 'Noto Sans TC', sans-serif; font-weight: 700; cursor: pointer; text-decoration: none; transition: all 0.2s; white-space: nowrap; }
.nav-btn:hover { border-color: var(--red); color: var(--red); }
.nav-btn.active { background: var(--red); border-color: var(--red); color: #fff; }

/* SYNC */
.sync-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 8px 16px; display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--muted); }
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--gray); flex-shrink: 0; }
.sync-dot.ok { background: var(--green); }
.sync-dot.loading { background: var(--yellow); animation: pulse 1s infinite; }
.sync-dot.error { background: var(--red); }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
.refresh-btn { margin-left: auto; padding: 4px 10px; border-radius: 5px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 11px; font-family: 'Noto Sans TC', sans-serif; cursor: pointer; }
.refresh-btn:hover { border-color: var(--red); color: var(--red); }

/* MONTH TABS */
.month-bar { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; overflow-x: auto; scrollbar-width: none; }
.month-bar::-webkit-scrollbar { display: none; }
.month-tab { flex-shrink: 0; padding: 10px 16px; font-size: 12px; font-weight: 700; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.2s; font-family: 'Oswald', sans-serif; letter-spacing: 0.5px; }
.month-tab:hover { color: var(--text); }
.month-tab.active { color: var(--red); border-bottom-color: var(--red); }

/* SECTION */
.section { padding: 16px 16px 0; }
.section-title { font-size: 13px; letter-spacing: 3px; color: var(--muted); font-weight: 700; font-family: 'Oswald', sans-serif; margin-bottom: 12px; }

/* TRAFFIC LIGHTS */
.lights-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px; }
.light-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; position: relative; overflow: hidden; transition: border-color 0.2s; }
.light-card:hover { border-color: rgba(255,255,255,0.15); }
.light-card.green { border-left: 3px solid var(--green); }
.light-card.yellow { border-left: 3px solid var(--yellow); }
.light-card.red { border-left: 3px solid var(--red); }
.light-card.gray { border-left: 3px solid var(--gray); }
.light-name { font-size: 16px; font-weight: 900; margin-bottom: 4px; }
.light-score { font-family: 'Oswald', sans-serif; font-size: 36px; font-weight: 700; line-height: 1; margin-bottom: 2px; }
.light-card.green .light-score { color: var(--green); }
.light-card.yellow .light-score { color: var(--yellow); }
.light-card.red .light-score { color: var(--red); }
.light-card.gray .light-score { color: var(--gray); }
.light-label { font-size: 14px; font-weight: 700; padding: 2px 8px; border-radius: 10px; display: inline-block; }
.light-card.green .light-label { background: var(--green-bg); color: var(--green); }
.light-card.yellow .light-label { background: var(--yellow-bg); color: var(--yellow); }
.light-card.red .light-label { background: var(--red-bg); color: var(--red); }
.light-card.gray .light-label { background: var(--gray-bg); color: var(--muted); }
.light-size { font-size: 14px; color: var(--muted); margin-top: 4px; }

/* DATA TABLE */
.data-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 12px; }
.data-card-head { padding: 12px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.data-card-title { font-size: 13px; font-weight: 900; }
.data-card-month { font-size: 11px; color: var(--muted); }
.data-table { width: 100%; }
.data-table th { padding: 10px 14px; text-align: left; font-size: 13px; color: var(--muted); letter-spacing: 1px; font-weight: 700; border-bottom: 1px solid var(--border); }
.data-table td { padding: 12px 14px; font-size: 15px; border-bottom: 1px solid rgba(255,255,255,0.04); }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: rgba(255,255,255,0.02); }
.branch-name { font-weight: 700; }
.num-up { color: var(--green); font-weight: 700; }
.num-down { color: var(--red); font-weight: 700; }
.num-zero { color: var(--muted); }

/* PALMS */
.palms-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
.palms-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
.palms-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.palms-name { font-size: 17px; font-weight: 900; }
.palms-week { font-size: 11px; color: var(--muted); background: var(--surface2); padding: 3px 8px; border-radius: 10px; }
.progress-item { margin-bottom: 10px; }
.progress-top { display: flex; justify-content: space-between; font-size: 14px; color: var(--muted); margin-bottom: 4px; }
.progress-top strong { color: var(--text); font-weight: 700; }
.progress-pct { font-weight: 900; }
.progress-bar { height: 8px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
.fill-green { background: var(--green); }
.fill-yellow { background: var(--yellow); }
.fill-red { background: var(--red); }
.fill-gray { background: var(--gray); }

/* CHART */
.chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 16px; }
.chart-title { font-size: 15px; font-weight: 700; color: var(--muted); letter-spacing: 1px; margin-bottom: 12px; font-family: 'Oswald', sans-serif; }
.chart-wrap { position: relative; height: 180px; }

/* LOADING */
.loading { padding: 40px; text-align: center; color: var(--muted); font-size: 13px; }

@keyframes fadeUp { from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)} }
.lights-grid, .data-card, .palms-card, .chart-card { animation: fadeUp 0.3s ease both; }
</style>
</head>

<script>
const SHEET_ID = '1gD7k1ZI81gSC5FbkiimFAiHm0AvbBQI0k0jFRfKXJsA';
const WEEKLY_SHEET_ID = '1Z6ZUPXNRtmQrE-xMNXoKGrJctz5qzWcI-kdGrtJU1tU';
// Branch config
const BRANCHES = [
  { id: '聚財', name: '聚財', person: 'Steven', sheet: '聚財_數據', start: 58, target: 85, refTarget: 700, guestTarget: 40 },
  { id: '聚道', name: '聚道', person: 'Steven', sheet: '聚道_數據', start: 36, target: 60, refTarget: 360, guestTarget: 28 },
  { id: '聚大', name: '聚大', person: '林綉蓉', sheet: '聚大_數據', start: 24, target: 51, refTarget: 450, guestTarget: 30 },
  { id: '聚富', name: '聚富', person: '吳宗憲', sheet: '聚富_數據', start: 21, target: 50, refTarget: 400, guestTarget: 50 },
];

// Months will be dynamically determined from data
const MONTHS = [];
const MONTH_LABELS = [];
// PALMS month is always current month
const PALMS_MONTH = '202604';

// State
let curMonth = '';
let sheetData = {};
let charts = {};

// ============================================================
// FETCH
// ============================================================
async function fetchCSV(sheet) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheet)}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error('fetch failed');
  return parseCSV(await r.text());
}

function parseCSV(text) {
  const rows = [];
  text = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  let row=[], cur='', inQ=false;
  for (let i=0; i<text.length; i++) {
    const c = text[i];
    if (c==='"') { if(inQ&&text[i+1]==='"'){cur+='"';i++;}else{inQ=!inQ;} }
    else if (c===','&&!inQ) { row.push(cur.trim()); cur=''; }
    else if (c==='\n'&&!inQ) { row.push(cur.trim()); if(row.some(r=>r!=='')) rows.push(row); row=[]; cur=''; }
    else { cur+=c; }
  }
  if(cur||row.length){row.push(cur.trim());if(row.some(r=>r!==''))rows.push(row);}
  return rows;
}

function parseBranchSheet(rows) {
  const result = {};
  if (!rows || rows.length < 2) return result;
  // Clean headers - remove quotes, newlines, extra spaces
  const headers = rows[0].map(h => h.replace(/"/g,'').replace(/[\n\r]/g,'').replace(/\s+/g,' ').trim());
  console.log('[BRANCH] headers:', headers);
  for (let i=1; i<rows.length; i++) {
    const row = rows[i];
    const month = (row[0]||'').replace(/"/g,'').trim();
    if (!month || !/^\d{6}$/.test(month)) continue;
    result[month] = {};
    headers.forEach((h,idx) => {
      if (h) result[month][h] = (row[idx]||'').replace(/"/g,'').trim();
    });
  }
  console.log('[BRANCH] parsed months:', Object.keys(result));
  const firstMonth = Object.keys(result)[0];
  if (firstMonth) console.log('[BRANCH] first row keys:', Object.keys(result[firstMonth]));
  return result;
}

function parseCrossSheet(rows) {
  // Headers are missing in CSV due to merged cells - hardcode them
  const CROSS_HEADERS = ['分會', '月淨增長（人）', '來賓數（人）', '缺席率（%）', 'ROI >20X（%）'];
  const result = { headers: CROSS_HEADERS, data: [] };
  
  // Find the SECOND row with '分會' in column A (first is trend table, second is cross comparison)
  let headerRowIdx = -1;
  let foundCount = 0;
  for (let i = 0; i < rows.length; i++) {
    const cell = (rows[i][0]||'').replace(/"/g,'').trim();
    if (cell === '分會') {
      foundCount++;
      if (foundCount === 2) { headerRowIdx = i; break; }
    }
  }
  if (headerRowIdx < 0) return result;
  
  // Read data rows after header
  for (let i = headerRowIdx+1; i < rows.length; i++) {
    const row = rows[i];
    const branch = (row[0]||'').replace(/"/g,'').trim();
    if (!branch) break;
    const obj = {};
    CROSS_HEADERS.forEach((h, idx) => {
      obj[h] = (row[idx]||'').replace(/"/g,'').trim();
    });
    result.data.push(obj);
  }
  console.log('[CROSS] data:', result.data);
  return result;
}

function parsePalmsSheet(rows) {
  const result = {};
  if (!rows || rows.length < 2) return result;
  const headers = rows[0].map(h => h.replace(/"/g,'').trim());
  for (let i=1; i<rows.length; i++) {
    const row = rows[i];
    const month = (row[0]||'').replace(/"/g,'').trim();
    const branch = (row[1]||'').replace(/"/g,'').trim();
    if (!month||!branch) continue;
    if (!result[month]) result[month] = {};
    result[month][branch] = {};
    headers.forEach((h,idx) => {
      result[month][branch][h] = (row[idx]||'').replace(/"/g,'').trim();
    });
  }
  return result;
}

async function loadAll() {
  setSyncStatus('loading','載入資料中...');
  if (location.hash !== '#weekly') document.getElementById('mainContent').innerHTML = '<div class="loading">載入中...</div>';
  
  // Load all in parallel with timeout
  const loadBranch = async (b) => {
    try {
      const rows = await fetchCSV(b.sheet);
      sheetData[b.id] = parseBranchSheet(rows);
    } catch(e) { sheetData[b.id] = {}; }
  };
  
  const loadPalms = async () => {
    try {
      const rows = await fetchCSV('當月Palms進度');
      sheetData['palms'] = parsePalmsSheet(rows);
    } catch(e) { sheetData['palms'] = {}; }
  };

  const loadCross = async () => {
    try {
      const rows = await fetchCSV('月度橫向比較');
      sheetData['cross'] = parseCrossSheet(rows);
    } catch(e) { sheetData['cross'] = { headers:[], data:[] }; }
  };
const loadWeekly = async () => {
    try {
      const url = `https://docs.google.com/spreadsheets/d/${WEEKLY_SHEET_ID}/gviz/tq?tqx=out:csv&sheet=表單回覆 1`;
      const r = await fetch(url);
      const text = await r.text();
      const rows = parseCSV(text);
      sheetData['weekly'] = rows;
    } catch(e) { sheetData['weekly'] = []; }
  };
 try {
    await Promise.all([
      ...BRANCHES.map(b => loadBranch(b)),
      loadPalms(),
      loadCross(),
      loadWeekly()
    ]);
    setSyncStatus('ok','資料已同步');
  } catch(e) {
    setSyncStatus('error','部分資料載入失敗');
  }
  if (location.hash !== '#weekly') render();
} 

function setSyncStatus(s, t) {
  document.getElementById('syncDot').className = 'sync-dot ' + s;
  document.getElementById('syncText').textContent = t;
}

// ============================================================
// CALCULATIONS
// ============================================================
function getMonthIdx(month) {
  return MONTHS.indexOf(month); // 0=4月, 1=5月...
}

function getProgressTarget(branch, monthIdx) {
  // monthIdx: 0=4月, 1=5月, ..., 5=9月
  const ratio = (monthIdx + 1) / 6;
  const targetPeople = branch.start + (branch.target - branch.start) * ratio;
  const peopleRatio = targetPeople / branch.target;
  return {
    people: Math.round(targetPeople),
    ref: Math.round(branch.refTarget * peopleRatio),
    guest: Math.round(branch.guestTarget * peopleRatio),
  };
}

function getBranchLatest(branchId) {
  const data = sheetData[branchId] || {};
  // Find latest month across ALL available months, not just MONTHS array
  const allMonths = Object.keys(data).filter(m => /^\d{6}$/.test(m)).sort();
  for (let i = allMonths.length - 1; i >= 0; i--) {
    if (data[allMonths[i]] && data[allMonths[i]]['燈號']) return data[allMonths[i]];
  }
  return null;
}

function getBranchMonth(branchId, month) {
  return (sheetData[branchId] || {})[month] || null;
}

function getLightClass(light) {
  if (light === '綠') return 'green';
  if (light === '黃') return 'yellow';
  if (light === '紅') return 'red';
  return 'gray';
}

function getLightLabel(light) {
  if (light === '綠') return '🟢 綠燈';
  if (light === '黃') return '🟡 黃燈';
  if (light === '紅') return '🔴 紅燈';
  return '⚪ 未填';
}

function pctColor(pct) {
  if (pct >= 80) return 'fill-green';
  if (pct >= 60) return 'fill-yellow';
  if (pct > 0) return 'fill-red';
  return 'fill-gray';
}

function numClass(n) {
  const v = parseFloat(n);
  if (isNaN(v) || v === 0) return 'num-zero';
  return v > 0 ? 'num-up' : 'num-down';
}

// ============================================================
// RENDER
// ============================================================
function showWeekly() {
document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
document.getElementById('weeklyBtn').classList.add('active');
  const rows = sheetData['weekly'] || [];
  const headers = rows[0] || [];
  const data = rows.slice(1);
  const now = new Date();
  const thisMonth = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}`;
  const idx = (name) => headers.indexOf(name);
  const iCols = ['應到人數','實到人數','缺席人數','來賓應到(無則填0)','來賓實到(無則填0)','一對一次數(無則填0)','引薦單數(無則填0)'];
  const latest = {};
  const monthly = {};
  BRANCHES.forEach(b => { latest[b.name] = null; monthly[b.name] = {}; iCols.forEach(c => monthly[b.name][c] = 0); });
  data.forEach(row => {
    const branch = row[idx('分會')];
    const dateStr = row[idx('例會日期')] || '';
    const parts = dateStr.split(/[-\/]/);
    const rowMonth = parts[0] + String(parts[1]).padStart(2,'0');
    if (branch) latest[branch] = row;

function getChartMonths(refMonth) {
  // Collect all months from all branch data + PALMS month
  const allMonths = new Set();
  BRANCHES.forEach(b => {
    Object.keys(sheetData[b.id]||{}).forEach(m => {
      if (/^\d{6}$/.test(m)) allMonths.add(m);
    });
  });
  // Add PALMS month
  Object.keys(sheetData['palms']||{}).forEach(m => {
    if (/^\d{6}$/.test(m)) allMonths.add(m);
  });
  const sorted = Array.from(allMonths).sort();
  const ref = refMonth || sorted[sorted.length-1];
  const refIdx = sorted.indexOf(ref);
  const end = refIdx >= 0 ? refIdx : sorted.length - 1;
  const start = Math.max(0, end - 6);
  const slice = sorted.slice(start, end + 1);
  return { months: slice, labels: slice.map(formatMonthLabel) };
}

function formatMonthLabel(m) {
  // 202504 -> 4月, 202412 -> 12月
  return parseInt(m.slice(4)) + '月';
}

function renderChart() {
  const ctx = document.getElementById('trendChart');
  if (!ctx) return;
  if (charts.trend) { charts.trend.destroy(); }

  const latestM = getLatestMonth();
  const palmsMonths = Object.keys(sheetData['palms']||{}).filter(m => /^\d{6}$/.test(m)).sort();
  const chartEndMonth = palmsMonths.length > 0 ? palmsMonths[palmsMonths.length-1] : latestM;
  const { months, labels } = getChartMonths(chartEndMonth);
  const colors = ['#E8001D','#00d97e','#ffd94a','#7c7cff'];
  const datasets = BRANCHES.map((b, i) => {
    const data = months.map(m => {
      // Try branch data first
      const d = (sheetData[b.id]||{})[m];
      if (d && d['分會規模']) return parseFloat(d['分會規模'])||null;
      // Fall back to PALMS actual people for current month
      const palms = (sheetData['palms']||{})[m];
      if (palms && palms[b.name] && palms[b.name]['實際人數']) {
        return parseFloat(palms[b.name]['實際人數'])||null;
      }
      return null;
    });
    return {
      label: b.name,
      data,
      borderColor: colors[i],
      backgroundColor: colors[i]+'22',
      borderWidth: 2,
      pointRadius: 4,
      pointBackgroundColor: colors[i],
      tension: 0.3,
      spanGaps: true,
    };
  });

  charts.trend = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: '#7a7a99', font: { family: 'Noto Sans TC', size: 11 }, boxWidth: 12 } }
      },
      scales: {
        x: { ticks: { color: '#7a7a99', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,0.05)' } },
        y: { ticks: { color: '#7a7a99', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,0.05)' } }
      }
    }
  });
}
