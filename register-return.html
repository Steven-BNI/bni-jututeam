<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>付款結果 | BNI 聚團隊</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold: #C9A84C;
      --dark: #0D0D0D;
      --dark2: #161616;
      --border: rgba(201,168,76,0.25);
      --text: #E8E8E0;
      --green: #52C07A;
      --red: #E05252;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Noto Sans TC', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--dark2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 32px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .icon {
      width: 80px; height: 80px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      margin: 0 auto 24px;
    }
    .icon.success { background: rgba(82,192,122,0.15); border: 2px solid var(--green); }
    .icon.fail    { background: rgba(224,82,82,0.15);  border: 2px solid var(--red); }
    .title { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
    .desc  { font-size: 14px; color: #888; line-height: 1.8; margin-bottom: 32px; }
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, var(--gold), #E8C96A);
      color: #000;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.05em;
    }
    .trade-no {
      background: rgba(255,255,255,0.04);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      color: #555;
      margin-bottom: 24px;
      word-break: break-all;
    }
  </style>
</head>
<body>
<div class="card" id="card">
  <!-- 由 JS 填入 -->
</div>
<script>
  const params = new URLSearchParams(location.search);
  const rtn    = params.get('RtnCode');
  const tradeNo = params.get('MerchantTradeNo') || '';
  const card   = document.getElementById('card');

  if (rtn === '1') {
    card.innerHTML = `
      <div class="icon success">✓</div>
      <div class="title">付款成功！</div>
      <div class="desc">您的培訓報名費用已成功付款。<br>活動資訊將寄送至您的 Email，敬請留意。</div>
      ${tradeNo ? `<div class="trade-no">交易編號：${tradeNo}</div>` : ''}
      <a href="training.html" class="btn">返回培訓公告</a>
    `;
  } else {
    card.innerHTML = `
      <div class="icon fail">✕</div>
      <div class="title">付款未完成</div>
      <div class="desc">付款流程未成功完成，您的報名資料已保留。<br>請重新嘗試付款，或聯繫您的分會聯絡人協助處理。</div>
      ${tradeNo ? `<div class="trade-no">交易編號：${tradeNo}</div>` : ''}
      <a href="training.html" class="btn">返回培訓公告</a>
    `;
  }
</script>
</body>
</html>
