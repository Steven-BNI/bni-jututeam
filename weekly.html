<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BNI 聚團隊｜分會週報</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --red: #E8001D;
  --bg: #0d0d14;
  --surface: #16161f;
  --border: rgba(255,255,255,0.08);
  --muted: #7a7a99;
  --green: #00d97e;
  --yellow: #ffd94a;
  --gray: #444;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:#fff; font-family:'Noto Sans TC',sans-serif; min-height:100vh; }
.header { background:linear-gradient(135deg,#0d0d14 0%,#1a0a0f 100%); padding:24px 20px 20px; border-bottom:2px solid var(--red); position:relative; overflow:hidden; }
.header::after { content:'DATA'; position:absolute; right:-10px; top:50%; transform:translateY(-50%); font-family:'Oswald',sans-serif; font-size:80px; font-weight:900; color:rgba(232,0,29,0.06); letter-spacing:-2px; }
.header-eyebrow { font-family:'Oswald',sans-serif; font-size:10px; letter-spacing:4px; color:var(--red); margin-bottom:6px; }
h1 { font-family:'Oswald',sans-serif; font-size:28px; font-weight:700; color:#fff; line-height:1.1; }
h1 em { color:var(--red); font-style:normal; }
.header-sub { font-size:11px; color:var(--muted); margin-top:4px; }
.nav-bar { background:var(--surface); border-bottom:1px solid var(--border); padding:10px 16px; display:flex; gap:8px; align-items:center; overflow-x:auto; scrollbar-width:none; }
.nav-bar::-webkit-scrollbar { display:none; }
.nav-btn { padding:6px 14px; border-radius:6px; border:1px solid var(--border); background:transparent; color:var(--muted); font-size:12px; font-family:'Noto Sans TC',sans-serif; font-weight:700; cursor:pointer; text-decoration:none; transition:all 0.2s; white-space:nowrap; }
.nav-btn:hover { border-color:var(--red); color:var(--red); }
.nav-btn.active { background:var(--red); border-color:var(--red); color:#fff; }
.sync-bar { background:var(--surface); border-bottom:1px solid var(--border); padding:8px 16px; display:flex; align-items:center; gap:8px; font-size:11px; color:var(--muted); }
.sync-dot { width:7px; height:7px; border-radius:50%; background:var(--gray); flex-shrink:0; }
.sync-dot.ok { background:var(--green); }
.sync-dot.loading { background:var(--yellow); animation:pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
.refresh-btn { margin-left:auto; padding:4px 10px; border-radius:5px; border:1px solid var(--border); background:transparent; color:var(--muted); font-size:11px; font-family:'Noto Sans TC',sans-serif; cursor:pointer; }
.refresh-btn:hover { border-color:var(--red); color:var(--red); }
#mainContent { padding:16px; }
.loading { text-align:center; padding:40px; color:var(--muted); font-size:13px; }
</style>
</head>
<body>
<div class="header">
  <div class="header-eyebrow">BNI 聚團隊</div>
  <h1>分會 <em>週報數據</em></h1>
  <div class="header-sub">例會出席｜來賓｜一對一｜引薦</div>
</div>
<div class="nav-bar">
  <a href="/bni-jututeam/dna-home.html" class="nav-btn">🔒 DnA 專區</a>
  <a href="/bni-jututeam/weekly.html" class="nav-btn active"> 分會週報</a>
  <a href="/bni-jututeam/calendar.html" class="nav-btn">📅 行事曆</a>
  <a href="https://drive.google.com/drive/folders/1vmewX4mzVlNzeEDZ9Bm759n_0ojYAK57?usp=drive_link" target="_blank" class="nav-btn">👥 成員介紹</a>
</div>
<div class="sync-bar">
  <div class="sync-dot loading" id="syncDot"></div>
  <span id="syncText">載入資料中...</span>
  <button class="refresh-btn" onclick="loadWeekly()">🔄 重新整理</button>
</div>
<div id="mainContent"><div class="loading">載入中...</div></div>
<script>
const WEEKLY_SHEET_ID = '1Z6ZUPXNRtmQrE-xMNXoKGrJctz5qzWcI-kdGrtJU1tU';
const PALMS_SHEET_ID = '1gD7k1ZI81gSC5FbkiimFAiHm0AvbBQI0k0jFRfKXJsA';

const BRANCHES = [
  { name:'聚財', monthlyTargets: {
    '202604':{people:63,ref:519,guest:30}, '202605':{people:67,ref:553,guest:32},
    '202606':{people:72,ref:588,guest:34}, '202607':{people:76,ref:623,guest:36},
    '202608':{people:81,ref:659,guest:38}, '202609':{people:85,ref:700,guest:40} }},
  { name:'聚道', monthlyTargets: {
    '202604':{people:40,ref:240,guest:19}, '202605':{people:44,ref:264,guest:21},
    '202606':{people:48,ref:288,guest:22}, '202607':{people:52,ref:312,guest:24},
    '202608':{people:56,ref:336,guest:26}, '202609':{people:60,ref:360,guest:28} }},
  { name:'聚大', monthlyTargets: {
    '202604':{people:29,ref:265,guest:18}, '202605':{people:33,ref:291,guest:20},
    '202606':{people:38,ref:318,guest:22}, '202607':{people:42,ref:344,guest:24},
    '202608':{people:47,ref:371,guest:26}, '202609':{people:51,ref:450,guest:30} }},
  { name:'聚富', monthlyTargets: {
    '202604':{people:26,ref:208,guest:29}, '202605':{people:31,ref:248,guest:35},
    '202606':{people:36,ref:288,guest:40}, '202607':{people:40,ref:320,guest:46},
    '202608':{people:45,ref:360,guest:51}, '202609':{people:50,ref:400,guest:50} }},
];

let palmsData = {};

function setSyncStatus(s, t) {
  document.getElementById('syncDot').className = 'sync-dot ' + s;
  document.getElementById('syncText').textContent = t;
}

function parseCSV(text) {
  const rows = [];
  text = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  let row=[], cur='', inQ=false;
  for (let i=0; i<text.length; i++) {
    const c = text[i];
    if (c==='"') { inQ=!inQ; }
    else if (c===',' && !inQ) { row.push(cur); cur=''; }
    else if (c==='\n' && !inQ) { row.push(cur); rows.push(row); row=[]; cur=''; }
    else cur+=c;
  }
  if (cur||row.length) { row.push(cur); rows.push(row); }
  return rows.filter(r=>r.some(c=>c.trim()));
}

function getMonthTarget(branch, thisMonth) {
  const t = branch.monthlyTargets[thisMonth];
  if (t) return { ref: t.ref, guest: t.guest, people: t.people };
  return { ref: 0, guest: 0, people: 0 };
}
async function loadWeekly() {
  setSyncStatus('loading','載入資料中...');
  try {
    const now = new Date();
    const thisMonth = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}`;

    // Load PALMS
    const palmsUrl = `https://docs.google.com/spreadsheets/d/${PALMS_SHEET_ID}/gviz/tq?tqx=out:csv&sheet=當月Palms進度`;
    const palmsR = await fetch(palmsUrl);
    const palmsText = await palmsR.text();
    const palmsRows = parseCSV(palmsText);
    const palmsHeaders = palmsRows[0] || [];
    const palmsNameIdx = palmsHeaders.indexOf('分會');
    const palmsPeopleIdx = palmsHeaders.indexOf('實際人數');
    palmsRows.slice(1).forEach(row => {
      const name = (row[palmsNameIdx]||'').trim();
      const people = parseFloat(row[palmsPeopleIdx]) || 0;
      if (name) palmsData[name] = people;
    });

    // Load weekly
    const url = `https://docs.google.com/spreadsheets/d/${WEEKLY_SHEET_ID}/gviz/tq?tqx=out:csv&sheet=表單回覆 1`;
    const r = await fetch(url);
    const text = await r.text();
    const rows = parseCSV(text);
    renderWeekly(rows, thisMonth);
    setSyncStatus('ok','資料已同步');
  } catch(e) {
    console.log('ERROR:', e.message, e.stack);
    setSyncStatus('error','載入失敗');
    document.getElementById('mainContent').innerHTML = '<div class="loading">載入失敗，請重新整理</div>';
  }


function renderWeekly(rows, thisMonth) {
  const headers = rows[0] || [];
  const data = rows.slice(1);
  const idx = (name) => headers.indexOf(name);

  const iCols = ['缺席人數','應到人數','來賓實到(無則填0)','一對一次數(無則填0)','引薦單數(無則填0)'];
  const latest = {};
  const monthly = {};
  const weeklyAbsRates = {};

  BRANCHES.forEach(b => {
    latest[b.name] = null;
    monthly[b.name] = { guest:0, ref:0, oneone:0, absRates:[] };
  });

  data.forEach(row => {
    const branch = row[idx('分會')];
    const dateStr = row[idx('例會日期')] || '';
    const parts = dateStr.split(/[-\/]/);
    const rowMonth = parts[0] + String(parts[1]).padStart(2,'0');
    if (branch) latest[branch] = row;
    if (rowMonth === thisMonth && branch && monthly[branch]) {
      const absent = parseFloat(row[idx('缺席人數')]) || 0;
      const shouldAttend = parseFloat(row[idx('應到人數')]) || 0;
      if (shouldAttend > 0) monthly[branch].absRates.push(absent / shouldAttend * 100);
      monthly[branch].guest += parseFloat(row[idx('來賓實到(無則填0)')]) || 0;
      monthly[branch].ref += parseFloat(row[idx('引薦單數(無則填0)')]) || 0;
      monthly[branch].oneone += parseFloat(row[idx('一對一次數(無則填0)')]) || 0;
    }
  });

  let html = '<h2 style="color:var(--red);margin-bottom:16px">📋 分會週報數據</h2>';

  BRANCHES.forEach(b => {
    const l = latest[b.name];
    const m = monthly[b.name];
    const actualPeople = targets.people || b.startPeople;
    const targets = getMonthTarget(b, thisMonth);
    const avgAbsRate = m.absRates.length > 0
      ? (m.absRates.reduce((a,c)=>a+c,0) / m.absRates.length).toFixed(1)
      : '—';

    // 最新一週
    const latestAbsent = l ? (parseFloat(l[idx('缺席人數')])||0) : 0;
    const latestShould = l ? (parseFloat(l[idx('應到人數')])||0) : 0;
    const latestAbsRate = latestShould > 0 ? (latestAbsent/latestShould*100).toFixed(1)+'%' : '—';
    const latestGuest = l ? (l[idx('來賓實到(無則填0)')]||0) : 0;
    const latestRef = l ? (l[idx('引薦單數(無則填0)')]||0) : 0;
    const latestOneOne = l ? (l[idx('一對一次數(無則填0)')]||0) : 0;

    html += `<div style="background:var(--surface);border-radius:12px;padding:16px;margin-bottom:16px">
      <h3 style="color:#fff;margin-bottom:4px">${b.name}</h3>
      <div style="color:var(--muted);font-size:11px;margin-bottom:12px">當月人數：${actualPeople} 人</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div style="background:#1e1e2e;border-radius:8px;padding:12px">
          <div style="color:#7a7a99;font-size:12px;margin-bottom:8px">最新一週</div>
          ${l ? `
            <div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="color:#aaa;font-size:13px">缺席率</span><span style="color:#fff;font-size:13px">${latestAbsRate}</span></div>
            <div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="color:#aaa;font-size:13px">來賓實到</span><span style="color:#fff;font-size:13px">${latestGuest}</span></div>
            <div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="color:#aaa;font-size:13px">一對一</span><span style="color:#fff;font-size:13px">${latestOneOne}</span></div>
            <div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="color:#aaa;font-size:13px">引薦單</span><span style="color:#fff;font-size:13px">${latestRef}</span></div>
          ` : '<div style="color:#555">尚無資料</div>'}
        </div>
        <div style="background:#1e1e2e;border-radius:8px;padding:12px">
          <div style="color:#7a7a99;font-size:12px;margin-bottom:8px">本月累積</div>
          <div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="color:#aaa;font-size:13px">平均缺席率</span><span style="color:#fff;font-size:13px">${avgAbsRate}%</span></div>
          <div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="color:#aaa;font-size:13px">來賓目標</span><span style="color:#ffd94a;font-size:13px">${targets.guest}</span></div>
          <div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="color:#aaa;font-size:13px">來賓累積</span><span style="color:#fff;font-size:13px">${m.guest}</span></div>
          <div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="color:#aaa;font-size:13px">一對一累積</span><span style="color:#fff;font-size:13px">${m.oneone}</span></div>
          <div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="color:#aaa;font-size:13px">引薦單目標</span><span style="color:#ffd94a;font-size:13px">${targets.ref}</span></div>
          <div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="color:#aaa;font-size:13px">引薦單累積</span><span style="color:#fff;font-size:13px">${m.ref}</span></div>
        </div>
      </div>
    </div>`;
  });

  document.getElementById('mainContent').innerHTML = html;
}

loadWeekly();
</script>
</body>
</html>
