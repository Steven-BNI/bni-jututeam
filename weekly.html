<html lang="zh-TW">
<head>
<meta charset="UTF-8">

<title>BNI 聚團隊｜分會週報</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --red: #E8001D;
  --bg: #0d0d14;
  --surface: #16161f;
  --border: rgba(255,255,255,0.08);
  --muted: #7a7a99;
  --green: #00d97e;
  --yellow: #ffd94a;
  --gray: #444;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:#fff; font-family:'Noto Sans TC',sans-serif; min-height:100vh; }
.header { background:linear-gradient(135deg,#0d0d14 0%,#1a0a0f 100%); padding:24px 20px 20px; border-bottom:2px solid var(--red); position:relative; overflow:hidden; }
.header::after { content:'DATA'; position:absolute; right:-10px; top:50%; transform:translateY(-50%); font-family:'Oswald',sans-serif; font-size:80px; font-weight:900; color:rgba(232,0,29,0.06); letter-spacing:-2px; }
.header-eyebrow { font-family:'Oswald',sans-serif; font-size:10px; letter-spacing:4px; color:var(--red); margin-bottom:6px; }
h1 { font-family:'Oswald',sans-serif; font-size:28px; font-weight:700; color:#fff; line-height:1.1; }
h1 em { color:var(--red); font-style:normal; }
.header-sub { font-size:11px; color:var(--muted); margin-top:4px; }
.nav-bar { background:var(--surface); border-bottom:1px solid var(--border); padding:10px 16px; display:flex; gap:8px; align-items:center; overflow-x:auto; scrollbar-width:none; }
.nav-bar::-webkit-scrollbar { display:none; }
.nav-btn { padding:6px 14px; border-radius:6px; border:1px solid var(--border); background:transparent; color:var(--muted); font-size:12px; font-family:'Noto Sans TC',sans-serif; font-weight:700; cursor:pointer; text-decoration:none; transition:all 0.2s; white-space:nowrap; }
.nav-btn:hover { border-color:var(--red); color:var(--red); }
.nav-btn.active { background:var(--red); border-color:var(--red); color:#fff; }
.sync-bar { background:var(--surface); border-bottom:1px solid var(--border); padding:8px 16px; display:flex; align-items:center; gap:8px; font-size:11px; color:var(--muted); }
.sync-dot { width:7px; height:7px; border-radius:50%; background:var(--gray); flex-shrink:0; }
.sync-dot.ok { background:var(--green); }
.sync-dot.loading { background:var(--yellow); animation:pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
.refresh-btn { margin-left:auto; padding:4px 10px; border-radius:5px; border:1px solid var(--border); background:transparent; color:var(--muted); font-size:11px; font-family:'Noto Sans TC',sans-serif; cursor:pointer; }
.refresh-btn:hover { border-color:var(--red); color:var(--red); }
#mainContent { padding:16px; }
.loading { text-align:center; padding:40px; color:var(--muted); font-size:13px; }
.branch-card { background:var(--surface); border-radius:12px; padding:16px; margin-bottom:16px; }
.branch-title { color:#fff; font-size:16px; font-weight:700; margin-bottom:4px; }
.branch-people { color:var(--muted); font-size:11px; margin-bottom:12px; }
.two-col { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.inner-card { background:#1e1e2e; border-radius:8px; padding:12px; }
.inner-title { color:#7a7a99; font-size:12px; margin-bottom:8px; }
.data-row { display:flex; justify-content:space-between; margin-bottom:4px; }
.data-label { color:#aaa; font-size:13px; }
.data-value { color:#fff; font-size:13px; }
.data-value.target { color:#ffd94a; }
.no-data { color:#555; font-size:13px; }
</style>
</head>
