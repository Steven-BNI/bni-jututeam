<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BNI 聚團隊｜分會週報</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --red: #E8001D;
  --bg: #0d0d14;
  --surface: #16161f;
  --border: rgba(255,255,255,0.08);
  --muted: #7a7a99;
  --green: #00d97e;
  --yellow: #ffd94a;
  --gray: #444;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:#fff; font-family:'Noto Sans TC',sans-serif; min-height:100vh; }
.header { background:linear-gradient(135deg,#0d0d14 0%,#1a0a0f 100%); padding:24px 20px 20px; border-bottom:2px solid var(--red); position:relative; overflow:hidden; }
.header::after { content:'DATA'; position:absolute; right:-10px; top:50%; transform:translateY(-50%); font-family:'Oswald',sans-serif; font-size:80px; font-weight:900; color:rgba(232,0,29,0.06); letter-spacing:-2px; }
.header-eyebrow { font-family:'Oswald',sans-serif; font-size:10px; letter-spacing:4px; color:var(--red); margin-bottom:6px; }
h1 { font-family:'Oswald',sans-serif; font-size:28px; font-weight:700; color:#fff; line-height:1.1; }
h1 em { color:var(--red); font-style:normal; }
.header-sub { font-size:11px; color:var(--muted); margin-top:4px; }
.nav-bar { background:var(--surface); border-bottom:1px solid var(--border); padding:10px 16px; display:flex; gap:8px; align-items:center; overflow-x:auto; scrollbar-width:none; }
.nav-bar::-webkit-scrollbar { display:none; }
.nav-btn { padding:6px 14px; border-radius:6px; border:1px solid var(--border); background:transparent; color:var(--muted); font-size:12px; font-family:'Noto Sans TC',sans-serif; font-weight:700; cursor:pointer; text-decoration:none; transition:all 0.2s; white-space:nowrap; }
.nav-btn:hover { border-color:var(--red); color:var(--red); }
.nav-btn.active { background:var(--red); border-color:var(--red); color:#fff; }
.sync-bar { background:var(--surface); border-bottom:1px solid var(--border); padding:8px 16px; display:flex; align-items:center; gap:8px; font-size:11px; color:var(--muted); }
.sync-dot { width:7px; height:7px; border-radius:50%; background:var(--gray); flex-shrink:0; }
.sync-dot.ok { background:var(--green); }
.sync-dot.loading { background:var(--yellow); animation:pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
.refresh-btn { margin-left:auto; padding:4px 10px; border-radius:5px; border:1px solid var(--border); background:transparent; color:var(--muted); font-size:11px; font-family:'Noto Sans TC',sans-serif; cursor:pointer; }
.refresh-btn:hover { border-color:var(--red); color:var(--red); }
#mainContent { padding:16px; }
.loading { text-align:center; padding:40px; color:var(--muted); font-size:13px; }
.branch-card { background:var(--surface); border-radius:12px; padding:16px; margin-bottom:16px; }
.branch-title { color:#fff; font-size:16px; font-weight:700; margin-bottom:4px; }
.branch-people { color:var(--muted); font-size:11px; margin-bottom:12px; }
.two-col { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.inner-card { background:#1e1e2e; border-radius:8px; padding:12px; }
.inner-title { color:#7a7a99; font-size:14px; margin-bottom:8px; }
.data-row { display:flex; justify-content:space-between; margin-bottom:4px; }
.data-label { color:#aaa; font-size:15px; }
.data-value { color:#fff; font-size:15px; }
.data-value.target { color:#ffd94a; }
.no-data { color:#555; font-size:15px; }
.lights-section { margin-bottom:20px; }
.lights-title { font-family:'Oswald',sans-serif; font-size:15px; color:var(--muted); letter-spacing:2px; margin-bottom:10px; }
.lights-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.light-card { background:var(--surface); border-radius:10px; padding:14px; }
.light-card-title { font-size:15px; font-weight:700; color:#fff; margin-bottom:10px; }
.light-bars { display:flex; flex-direction:column; gap:6px; }
.light-row { display:flex; align-items:center; gap:8px; }
.light-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.light-dot.green { background:#00d97e; }
.light-dot.yellow { background:#ffd94a; }
.light-dot.red { background:#E8001D; }
.light-dot.gray { background:#888; }
.light-bar-wrap { flex:1; background:rgba(255,255,255,0.06); border-radius:99px; height:8px; overflow:hidden; }
.light-bar-fill { height:100%; border-radius:99px; }
.light-bar-fill.green { background:#00d97e; }
.light-bar-fill.yellow { background:#ffd94a; }
.light-bar-fill.red { background:#E8001D; }
.light-bar-fill.gray { background:#888; }
.light-pct { font-size:13px; color:#fff; min-width:36px; text-align:right; }
</style>
</head>
<body>
<div class="header">
  <div class="header-eyebrow">BNI 聚團隊</div>
  <h1>分會 <em>週報數據</em></h1>
  <div class="header-sub">例會出席｜來賓｜一對一｜引薦</div>
</div>
<div class="nav-bar">
  <a href="/bni-jututeam/dna-home.html" class="nav-btn">🔒 DnA 專區</a>
  <a href="/bni-jututeam/weekly.html" class="nav-btn active">📋 分會週報</a>
  <a href="/bni-jututeam/training.html" class="nav-btn">🎓 培訓公告</a>
  <a href="/bni-jututeam/calendar.html" class="nav-btn">📅 行事曆</a>
  <a href="https://drive.google.com/drive/folders/1vmewX4mzVlNzeEDZ9Bm759n_0ojYAK57?usp=drive_link" target="_blank" class="nav-btn">👥 成員介紹</a>
</div>
<div class="sync-bar">
  <div class="sync-dot loading" id="syncDot"></div>
  <span id="syncText">載入資料中...</span>
  <button class="refresh-btn" onclick="loadAll()">🔄 重新整理</button>
</div>
<div id="mainContent"><div class="loading">載入中...</div></div>
<script>
var WEEKLY_SHEET_ID = '1Z6ZUPXNRtmQrE-xMNXoKGrJctz5qzWcI-kdGrtJU1tU';
var LIGHTS_SHEET_ID = '1JKHpemlHQd_iCp1FpRwyolwL1oL3LNNKtvd5AVEZ-eI';
var BRANCHES = [
  { name:'聚財', targets:{
    '202604':{people:63,ref:519,guest:30},
    '202605':{people:67,ref:553,guest:32},
    '202606':{people:72,ref:588,guest:34},
    '202607':{people:76,ref:623,guest:36},
    '202608':{people:81,ref:659,guest:38},
    '202609':{people:85,ref:700,guest:40}
  }},
  { name:'聚道', targets:{
    '202604':{people:40,ref:240,guest:19},
    '202605':{people:44,ref:264,guest:21},
    '202606':{people:48,ref:288,guest:22},
    '202607':{people:52,ref:312,guest:24},
    '202608':{people:56,ref:336,guest:26},
    '202609':{people:60,ref:360,guest:28}
  }},
  { name:'聚大', targets:{
    '202604':{people:29,ref:265,guest:18},
    '202605':{people:33,ref:291,guest:20},
    '202606':{people:38,ref:318,guest:22},
    '202607':{people:42,ref:344,guest:24},
    '202608':{people:47,ref:371,guest:26},
    '202609':{people:51,ref:450,guest:30}
  }},
  { name:'聚富', targets:{
    '202604':{people:26,ref:208,guest:29},
    '202605':{people:31,ref:248,guest:35},
    '202606':{people:36,ref:288,guest:40},
    '202607':{people:40,ref:320,guest:46},
    '202608':{people:45,ref:360,guest:51},
    '202609':{people:50,ref:400,guest:50}
  }}
];

function setSyncStatus(s, t) {
  document.getElementById('syncDot').className = 'sync-dot ' + s;
  document.getElementById('syncText').textContent = t;
}

function parseCSV(text) {
  var rows = [];
  text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  var row = [], cur = '', inQ = false;
  for (var i = 0; i < text.length; i++) {
    var c = text[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { row.push(cur); cur = ''; }
    else if (c === '\n' && !inQ) { row.push(cur); rows.push(row); row = []; cur = ''; }
    else { cur += c; }
  }
  if (cur || row.length) { row.push(cur); rows.push(row); }
  return rows.filter(function(r) { return r.some(function(c) { return c.trim(); }); });
}

function dataRow(label, value) {
  return '<div class="data-row"><span class="data-label">' + label + '</span><span class="data-value">' + value + '</span></div>';
}
function dataRowTarget(label, value) {
  return '<div class="data-row"><span class="data-label">' + label + '</span><span class="data-value target">' + value + '</span></div>';
}
function lightBar(cls, pct) {
  return '<div class="light-row"><div class="light-dot ' + cls + '"></div><div class="light-bar-wrap"><div class="light-bar-fill ' + cls + '" style="width:' + pct + '%"></div></div><div class="light-pct">' + pct + '%</div></div>';
}

async function loadAll() {
  setSyncStatus('loading', '載入資料中...');
  try {
    var now = new Date();
    var thisMonth = now.getFullYear() + String(now.getMonth() + 1).padStart(2, '0');
    var lightsUrl = 'https://docs.google.com/spreadsheets/d/' + LIGHTS_SHEET_ID + '/gviz/tq?tqx=out:csv&sheet=' + encodeURIComponent('會員紅綠燈');
    var weeklyUrl = 'https://docs.google.com/spreadsheets/d/' + WEEKLY_SHEET_ID + '/gviz/tq?tqx=out:csv&sheet=' + encodeURIComponent('表單回覆 1');
    var results = await Promise.all([fetch(lightsUrl), fetch(weeklyUrl)]);
    var lightsText = await results[0].text();
    var weeklyText = await results[1].text();
    render(parseCSV(lightsText), parseCSV(weeklyText), thisMonth);
    setSyncStatus('ok', '資料已同步');
  } catch(e) {
    console.log('ERROR:', e.message);
    setSyncStatus('error', '載入失敗');
    document.getElementById('mainContent').innerHTML = '<div class="loading">載入失敗，請重新整理</div>';
  }
}

function render(lightsRows, weeklyRows, thisMonth) {
  var lHeaders = lightsRows[0] || [];
  var lightsData = {};
  var lightsMonth = '';
  lightsRows.slice(1).forEach(function(row) {
    var month = (row[lHeaders.indexOf('月份')] || '').trim();
    var branch = (row[lHeaders.indexOf('分會')] || '').trim();
    if (month && branch) {
      if (!lightsData[branch] || month > lightsData[branch].month) {
        lightsData[branch] = {
          month: month,
          green: parseFloat(row[lHeaders.indexOf('綠燈%')]) || 0,
          yellow: parseFloat(row[lHeaders.indexOf('黃燈%')]) || 0,
          red: parseFloat(row[lHeaders.indexOf('紅燈%')]) || 0,
          gray: parseFloat(row[lHeaders.indexOf('灰燈%')]) || 0
        };
        lightsMonth = month;
      }
    }
  });

  var monthLabel = lightsMonth ? lightsMonth.slice(0,4) + '年' + parseInt(lightsMonth.slice(4)) + '月' : '';

  var lightsHtml = '<div class="lights-section">';
  lightsHtml += '<div class="lights-title">會員紅綠燈比例｜' + monthLabel + '</div>';
  lightsHtml += '<div class="lights-grid">';
  BRANCHES.forEach(function(b) {
    var d = lightsData[b.name] || { green:0, yellow:0, red:0, gray:0 };
    lightsHtml += '<div class="light-card">';
    lightsHtml += '<div class="light-card-title">' + b.name + '</div>';
    lightsHtml += '<div class="light-bars">';
    lightsHtml += lightBar('green', d.green);
    lightsHtml += lightBar('yellow', d.yellow);
    lightsHtml += lightBar('red', d.red);
    lightsHtml += lightBar('gray', d.gray);
    lightsHtml += '</div></div>';
  });
  lightsHtml += '</div></div>';

  var wHeaders = weeklyRows[0] || [];
  var data = weeklyRows.slice(1);
  function idx(name) { return wHeaders.indexOf(name); }
  var latest = {};
  var monthly = {};
  BRANCHES.forEach(function(b) {
    latest[b.name] = null;
    monthly[b.name] = { guest:0, ref:0, oneone:0, absRates:[] };
  });
  data.forEach(function(row) {
    var branch = row[idx('分會')];
    var dateStr = row[idx('例會日期')] || '';
    var parts = dateStr.split(/[-\/]/);
    var rowMonth = parts[0] + String(parts[1]).padStart(2, '0');
    if (branch) { latest[branch] = row; }
    if (rowMonth === thisMonth && branch && monthly[branch]) {
      var absent = parseFloat(row[idx('缺席人數')]) || 0;
      var shouldAttend = parseFloat(row[idx('應到人數')]) || 0;
      if (shouldAttend > 0) { monthly[branch].absRates.push(absent / shouldAttend * 100); }
      monthly[branch].guest += parseFloat(row[idx('來賓實到(無則填0)')]) || 0;
      monthly[branch].ref += parseFloat(row[idx('引薦單數(無則填0)')]) || 0;
      monthly[branch].oneone += parseFloat(row[idx('一對一次數(無則填0)')]) || 0;
    }
  });

  var html = lightsHtml;
  html += '<h2 style="color:var(--red);margin-bottom:16px">分會週報數據</h2>';

  BRANCHES.forEach(function(b) {
    var l = latest[b.name];
    var m = monthly[b.name];
    var t = b.targets[thisMonth] || { people:0, ref:0, guest:0 };
    var avgAbsRate = m.absRates.length > 0
      ? (m.absRates.reduce(function(a,c){return a+c;},0)/m.absRates.length).toFixed(1)+'%' : '—';
    var latestBlock = '';
    if (l) {
      var absent = parseFloat(l[idx('缺席人數')])||0;
      var shouldAttend = parseFloat(l[idx('應到人數')])||0;
      var absRate = shouldAttend>0?(absent/shouldAttend*100).toFixed(1)+'%':'—';
      latestBlock += dataRow('應到人數', l[idx('應到人數')]||0);
      latestBlock += dataRow('實到人數', l[idx('實到人數')]||0);
      latestBlock += dataRow('缺席人數', l[idx('缺席人數')]||0);
      latestBlock += dataRow('缺席率', absRate);
      latestBlock += dataRow('遲到人數', l[idx('遲到人數')]||0);
      latestBlock += dataRow('代理人數', l[idx('代理人數')]||0);
      latestBlock += dataRow('新會員宣誓', l[idx('新會員宣誓(無則填0)')]||0);
      latestBlock += dataRow('續約會員宣誓', l[idx('續約會員宣誓(無則填0)')]||0);
      latestBlock += dataRow('來賓應到', l[idx('來賓應到(無則填0)')]||0);
      latestBlock += dataRow('來賓實到', l[idx('來賓實到(無則填0)')]||0);
      latestBlock += dataRow('一對一', l[idx('一對一次數(無則填0)')]||0);
      latestBlock += dataRow('引薦單', l[idx('引薦單數(無則填0)')]||0);
    } else {
      latestBlock = '<div class="no-data">尚無資料</div>';
    }
    var currentPeople = l?(l[idx('應到人數')]||0):0;
    var seasonTarget = b.targets['202609']?b.targets['202609'].people:0;
    var monthlyBlock = '';
    monthlyBlock += dataRowTarget('會期目標人數', seasonTarget);
    monthlyBlock += dataRowTarget('當月目標人數', t.people);
    monthlyBlock += dataRow('現有人數', currentPeople);
    monthlyBlock += dataRow('平均缺席率', avgAbsRate);
    monthlyBlock += dataRowTarget('來賓目標', t.guest);
    monthlyBlock += dataRow('來賓累積', m.guest);
    monthlyBlock += dataRow('一對一累積', m.oneone);
    monthlyBlock += dataRowTarget('引薦單目標', t.ref);
    monthlyBlock += dataRow('引薦單累積', m.ref);

    html += '<div class="branch-card">';
    html += '<div class="branch-title">' + b.name + '</div>';
    html += '<div class="branch-people">當月目標人數：' + t.people + ' 人</div>';
    html += '<div class="two-col">';
    html += '<div class="inner-card"><div class="inner-title">' + (l?(l[idx('例會日期')]||'最新一週'):'最新一週') + '</div>' + latestBlock + '</div>';
    html += '<div class="inner-card"><div class="inner-title">本月累積</div>' + monthlyBlock + '</div>';
    html += '</div></div>';
  });

  document.getElementById('mainContent').innerHTML = html;
}

loadAll();
</script>
</body>
</html>
